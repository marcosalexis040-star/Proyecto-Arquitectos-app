# Blueprint de despliegue para Render (https://render.com/docs/blueprint-spec)
# Desde el dashboard de Render: New + → Blueprint → conectar este repositorio.
services:
  - type: web
    name: prompt-to-spec-pro
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Modo demo por defecto: la app funciona gratis sin API key.
      # Para activar la API real de Claude, cambia MOCK_CLAUDE a "false"
      # y define ANTHROPIC_API_KEY en el dashboard.
      - key: MOCK_CLAUDE
        value: "true"
      # sync: false = el valor NO vive en el repo; Render lo pide/gestiona
      # en el dashboard. Déjalo vacío mientras MOCK_CLAUDE sea "true".
      - key: ANTHROPIC_API_KEY
        sync: false
    # PORT no se declara: Render lo inyecta automáticamente y
    # src/server.js ya lo lee con process.env.PORT.
